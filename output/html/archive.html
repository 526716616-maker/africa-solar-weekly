<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>非洲离网太阳能市场资讯 - 往期目录</title>
<style>/* ===== 非洲离网太阳能市场资讯 - 样式 ===== */
:root {
  --bg: #f8f9fa;
  --card: #ffffff;
  --text: #1a1a2e;
  --text-secondary: #555770;
  --text-tertiary: #8e8ea0;
  --border: #e8e8ee;
  --green-dark: #0F6E56;
  --green-light: #1D9E75;
  --green-bg: #E1F5EE;
  --green-tag-bg: rgba(15,110,86,0.08);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
    "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 48px;
}

/* ===== Header ===== */
.header {
  background: var(--green-dark);
  color: #fff;
  padding: 28px 28px 22px;
  border-radius: var(--radius-lg);
  margin-bottom: 24px;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 2px;
  letter-spacing: -0.01em;
}
.header .subtitle {
  font-size: 13px;
  opacity: 0.78;
  font-weight: 400;
}
.header .meta {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.header .meta span {
  background: rgba(255,255,255,0.15);
  border-radius: var(--radius-sm);
  padding: 3px 10px;
  font-size: 11px;
  letter-spacing: 0.02em;
}

/* ===== Stats Row ===== */
.section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 28px 0 10px;
}
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 8px;
}
.stat-box {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 12px;
  text-align: center;
}
.stat-box .num {
  font-size: 20px;
  font-weight: 700;
  color: var(--green-dark);
  margin-bottom: 4px;
}
.stat-box .lbl {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.3;
}
@media (max-width: 560px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}

/* ===== News Card ===== */
.news-card {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 12px;
  transition: border-color 0.15s;
}
.news-card:hover { border-color: var(--green-light); }
.news-card .tag {
  display: inline-block;
  background: var(--green-tag-bg);
  color: var(--green-dark);
  font-size: 11px;
  font-weight: 500;
  padding: 2px 10px;
  border-radius: 100px;
}
.news-card .card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.news-card .card-date {
  font-size: 11px;
  color: var(--text-tertiary);
  white-space: nowrap;
}
.news-card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
}
/* ===== 通用：卡片内列表 & 段落样式 ===== */
.news-card .summary,
.company-card .summary {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.news-card .bullets,
.company-card .bullets {
  list-style: none;
  margin-bottom: 10px;
}
.news-card .bullets li,
.company-card .bullets li {
  font-size: 12px;
  color: var(--text-secondary);
  padding: 2px 0 2px 16px;
  position: relative;
  word-break: break-word;
}
.news-card .bullets li::before,
.company-card .bullets li::before {
  content: "";
  position: absolute;
  left: 2px;
  top: 9px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green-light);
}
.news-card .mb,
.company-card .mb { margin-bottom: 8px; }
.news-card .bullets,
.company-card .bullets { margin-bottom: 0; }
.news-card .source {
  font-size: 11px;
  color: var(--text-tertiary);
}
.news-card .source a {
  color: var(--green-dark);
  text-decoration: none;
}
.news-card .source a:hover { text-decoration: underline; }

/* ===== Company Card ===== */
.company-card {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 12px;
  transition: border-color 0.15s;
}
.company-card:hover { border-color: var(--green-light); }
.company-card .tag {
  display: inline-block;
  background: var(--green-tag-bg);
  color: var(--green-dark);
  font-size: 11px;
  font-weight: 500;
  padding: 2px 10px;
  border-radius: 100px;
}
.company-card .card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.company-card .card-date {
  font-size: 11px;
  color: var(--text-tertiary);
  white-space: nowrap;
}
.company-card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
}
.company-card .source {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 8px;
}
.company-card .source a {
  color: var(--green-dark);
  text-decoration: none;
}
.company-card .source a:hover { text-decoration: underline; }

/* ===== Archive Nav ===== */
.nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.nav-bar a {
  font-size: 12px;
  color: var(--green-dark);
  text-decoration: none;
  padding: 4px 0;
}
.nav-bar a:hover { text-decoration: underline; }

/* ===== Archive Page ===== */
.archive-list {
  list-style: none;
}
.archive-item {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  margin-bottom: 10px;
  transition: border-color 0.15s;
}
.archive-item:hover { border-color: var(--green-light); }
.archive-item a {
  text-decoration: none;
  color: var(--text);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.archive-item .issue-title {
  font-size: 14px;
  font-weight: 600;
}
.archive-item .issue-meta {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
}
.archive-item .issue-count {
  font-size: 12px;
  color: var(--green-dark);
  font-weight: 500;
  white-space: nowrap;
}

/* ===== Footer ===== */
.footer {
  text-align: center;
  font-size: 11px;
  color: var(--text-tertiary);
  border-top: 0.5px solid var(--border);
  padding-top: 20px;
  margin-top: 32px;
}

.archive-header { text-align:center; padding:24px 0 8px; }
.archive-header h1 { font-size:18px; color:var(--green-dark); }
.archive-header p { font-size:12px; color:var(--text-tertiary); margin-top:4px; }
</style>
