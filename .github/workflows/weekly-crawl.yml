# =============================================================================
# 非洲离网太阳能市场周报 - 全自动流水线
# =============================================================================
# 每周一 UTC 23:00 (北京时间周一 07:00) 自动执行:
#   抓取 18 个源 → 清洗 → 英译中 → 生成 HTML → 部署到 Pages
# =============================================================================

name: Weekly Africa Solar Report

on:
  schedule:
    - cron: "0 23 * * 0"
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    if: ${{ !(github.event_name == 'push' && (github.actor == 'github-actions[bot]' || github.actor == 'Daily Crawler Bot')) }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt deep-translator

      - name: 运行爬虫（最近14天）
        run: python scripts/fetch_news.py --days 7
        env:
          PYTHONIOENCODING: utf-8

      - name: 生成日报（清洗+翻译+HTML）
        run: python scripts/auto_weekly.py
        env:
          PYTHONIOENCODING: utf-8
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}

      - name: 提交产物到仓库
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 自动日报 $(date +%Y-%m-%d)"
          file_pattern: "output/"
          commit_user_name: "Daily Crawler Bot"
          commit_user_email: "bot@africa-solar-daily.local"

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/html

  deploy:
    if: ${{ !(github.event_name == 'push' && (github.actor == 'github-actions[bot]' || github.actor == 'Daily Crawler Bot')) }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
